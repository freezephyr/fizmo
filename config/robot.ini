[robot]
leg_length_mm = 56.0
stable_tilt_deg = 12.0
caution_tilt_deg = 25.0
fallen_tilt_deg = 45.0

[servo_driver]
kind = pca9685
i2c_address = 0x40
frequency_hz = 50
min_pulse_us = 500
max_pulse_us = 2500

[imu]
kind = mpu6050
i2c_address = 0x68
bus = 1

[camera]
kind = raspberry_pi_camera
megapixels = 5

[display]
kind = pirate_audio
width = 240
height = 240

[logging]
enabled = true
directory = logs/behavior
max_files = 20
max_total_mb = 250

[agent]
wake_word = Fiz

[servo.front_left]
channel = 0
neutral_deg = 90.0
logical_zero_deg = 0.0
logical_scale = 1.0
min_deg = 0.0
max_deg = 180.0
reversed = false

[servo.front_right]
channel = 1
neutral_deg = 90.0
logical_zero_deg = 0.0
logical_scale = 1.0
min_deg = 0.0
max_deg = 180.0
reversed = false

[servo.rear_left]
channel = 2
neutral_deg = 90.0
logical_zero_deg = 0.0
logical_scale = 1.0
min_deg = 0.0
max_deg = 180.0
reversed = false

[servo.rear_right]
channel = 3
neutral_deg = 90.0
logical_zero_deg = 0.0
logical_scale = 1.0
min_deg = 0.0
max_deg = 180.0
reversed = false
